<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerevyn AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
      /* 1. The @import MUST be the first line */
      @import url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css');

      /* 2. Then all other CSS rules */
      body { opacity: 0; transition: opacity 0.2s ease-in; }
      body.fonts-loaded { opacity: 1; }
      * { font-family: 'Geist', sans-serif !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
    <script>
      document.fonts.ready.then(() => {
        document.body.classList.add('fonts-loaded');
      });
      setTimeout(() => document.body.classList.add('fonts-loaded'), 1000);
    </script>
  </body>
</html>
